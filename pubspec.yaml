name: vocab_master
description: >
  VocabMaster — 英语单词学习 App。内置词库与自定义单词书，
  支持选择题/拼写/听音、关卡挑战、签到积分，面向 Android、iOS 与 Web。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  riverpod_annotation: ^2.3.0
  flutter_riverpod: ^2.4.0
  flutter_tts: ^4.0.0
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^17.0.0
  intl: ^0.20.2
  path_provider: ^2.1.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter_native_splash:
  color: "#3F51B5"
  image: assets/icon/app_icon.png
  android_12:
    color: "#3F51B5"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/books/
    - assets/icon/